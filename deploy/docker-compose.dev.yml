# Local dev: a Nextcloud instance + the Wanderer ExApp container,
# wired through AppAPI's manual deploy daemon. This is the
# "spin up a Nextcloud image and have them work together" loop.
#
# NOT smoke-tested in the authoring environment (no Docker). Treat as
# the validation harness to run locally; see README "Local validation".
#
# Flow after `docker compose -f deploy/docker-compose.dev.yml up -d`:
#   1. Finish the Nextcloud setup wizard (admin/admin below).
#   2. Install the AppAPI app (default since NC 30.0.1).
#   3. Register a manual-install deploy daemon, then register this
#      ExApp against it — see README for the exact `occ` commands.

services:
  nextcloud:
    image: nextcloud:30-apache
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost 127.0.0.1 nextcloud"
      SQLITE_DATABASE: nextcloud
    volumes:
      - nc_data:/var/www/html

  wanderer-exapp:
    build:
      context: ..
      dockerfile: Dockerfile
    # In a real AppAPI deploy the daemon injects APP_SECRET/APP_PORT/etc.
    # For a manual harness these are set to match the `occ` registration.
    environment:
      APP_ID: wanderer
      APP_VERSION: "0.1.0"
      APP_HOST: 0.0.0.0
      APP_PORT: "9000"
      APP_SECRET: "dev-shared-secret-change-me"
      NEXTCLOUD_URL: "http://nextcloud"
    ports:
      - "9000:9000"
    depends_on:
      - nextcloud

volumes:
  nc_data:
