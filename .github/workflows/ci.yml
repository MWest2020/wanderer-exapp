name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - run: go test ./...

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Build-only smoke of the image (no push). Confirms the
      # multi-stage build — including `go install` of the pinned
      # Wanderer core — succeeds.
      - name: docker build
        run: docker build -t wanderer-exapp:ci .
